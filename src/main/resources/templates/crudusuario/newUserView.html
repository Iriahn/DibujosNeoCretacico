<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/principal/fragmentos.html::cabecera}"><title>Dibujo</title></head>
<body>
    <header>
        <nav th:replace="~{/principal/fragmentos.html::navegador}"></nav>    
    </header>
    <main>
        <h1>Nuevo usuario</h1>
        <form action="#" method="post" th:action="@{/usuario/newUser/submit}" th:object="${usuario}">
            <input type="hidden" id="id" th:field="*{id}">
            <br>
            <label>Nombre:<input type="text" id="nombre" th:field="*{nombre}"></label>
            <br><br>
            <label>Contraseña:<input type="password" id="password" th:field="*{password}"></label>
            <br><br>
             Rol:<br>          
            <div th:each="r : ${T(com.example.proyecto.domain.RolEnum).values()}">
                <input type="radio" name="button1" th:value="${r}" th:text="${r}" th:field="*{rol}" />
            </div><br/>
            <input type="submit" value="Enviar" />
        </form>
    </main>
    <footer>© <span th:text="${anho}">2024</span></footer>
</body>
</html>
